services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379/1
      - PORT_PRODUCER=3000
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379/1
      - PORT_WORKER=3001
      - WORKER_CONCURRENCY=3
    depends_on:
      - redis
